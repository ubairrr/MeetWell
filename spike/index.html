<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSCH-04 System-Audio Capture Spike</title>
  <style>
    :root {
      --bg: #0f111a;
      --card-bg: #161925;
      --text: #e2e4f0;
      --text-muted: #8c92ac;
      --accent: #5e6ad2;
      --accent-hover: #727fe5;
      --accent-active: #ffb703;
      --danger: #ff5c5c;
      --border: #23283d;
      --font: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #5e6ad2, #8c92ac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 1rem;
    }

    #warning {
      color: var(--danger);
      background: rgba(255, 92, 92, 0.1);
      border: 1px dashed var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    #warning:not(:empty) {
      display: block;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-top: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      color: var(--accent-hover);
    }

    pre {
      background: #0b0d13;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      overflow-x: auto;
      margin: 0;
      color: #9cdcfe;
      border: 1px solid var(--border);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover:not(:disabled) {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background-color: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    #start-path1 {
      border: 1px solid rgba(255,255,255,0.1);
    }

    #start-path2 {
      background-color: #2b3044;
      border: 1px solid var(--border);
    }

    #start-path2:hover:not(:disabled) {
      background-color: #383e58;
    }

    #transcript-output {
      background-color: #0b0d13;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      min-height: 250px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .transcript-line {
      margin-bottom: 8px;
      border-bottom: 1px solid #161925;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>System-Audio Capture Spike</h1>
    <div class="subtitle">RSCH-04: Comparative validation of Native Chromium Flags vs AudioTee.js (Core Audio Taps)</div>

    <div id="warning"></div>

    <div class="card">
      <h2>Environment & Config</h2>
      <pre id="env-info">Loading environment info...</pre>
    </div>

    <div class="card">
      <h2>Interactive Capture</h2>
      <div class="controls">
        <button id="start-path1" disabled>▶ Start Path 1 (Chromium Flags)</button>
        <button id="start-path2" disabled>▶ Start Path 2 (AudioTee.js)</button>
      </div>
    </div>

    <div class="card">
      <h2>Deepgram Transcription Logs</h2>
      <div id="transcript-output">
        <em style="color: var(--text-muted);">Waiting to start capture...</em>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
